<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment - FreshCart Premium Storefront</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global Stylesheets -->
    <link href="/assets/css/styles.css" rel="stylesheet">
    <link href="/assets/css/customer.css" rel="stylesheet">
    <script>
        const colorScheme = localStorage.getItem("color-scheme") || "light";
        document.documentElement.setAttribute('data-theme', colorScheme);
    </script>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, rgba(var(--primary-rgb), 0.05) 0%, rgba(0, 0, 0, 0) 80%), var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .gateway-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: var(--shadow-deep);
            padding: 3.5rem 2.5rem;
            width: 100%;
            max-width: 460px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .payment-spinner-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid rgba(var(--primary-rgb), 0.15);
            border-top-color: var(--primary);
            animation: spin 1s infinite linear;
            margin: 0 auto 1.75rem;
        }

        .success-tick-animation {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--primary);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            margin: 0 auto 1.75rem;
            box-shadow: 0 10px 25px rgba(var(--primary-rgb), 0.3);
            animation: scale-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes scale-up {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .gateway-details-box {
            background-color: var(--bg-tertiary);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="gateway-card">
    <!-- Loader View -->
    <div id="paymentLoader">
        <div class="payment-spinner-ring"></div>
        <h4 class="fw-800 text-secondary mb-2" id="loaderTitle">Processing Payment</h4>
        <p class="text-secondary small mb-4">Please do not refresh the page or click back.</p>
        
        <div class="gateway-details-box small">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-secondary fw-600">Payment Gateway</span>
                <strong id="modeLabel" class="text-primary">-</strong>
            </div>
            <div class="d-flex justify-content-between">
                <span class="text-secondary fw-600">Total Transaction Amount</span>
                <strong class="text-success" id="amountLabel">₹0.00</strong>
            </div>
        </div>
    </div>

    <!-- Success View -->
    <div id="paymentSuccess" style="display:none;">
        <div class="success-tick-animation">
            <i class="bi bi-check2"></i>
        </div>
        <h3 class="fw-800 text-success mb-2">Payment Authorized</h3>
        <p class="text-secondary small mb-4">Your transaction was processed successfully. Placing order...</p>
        
        <div class="gateway-details-box small mb-2">
            <div class="d-flex justify-content-between">
                <span class="text-secondary fw-600">Reference ID</span>
                <strong id="txnIdLabel" class="text-primary">TXN-000000</strong>
            </div>
        </div>
    </div>
</div>

<!-- JS Scripts -->
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/products.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const mode = localStorage.getItem('checkout_payment_mode') || 'UPI';
        const amount = localStorage.getItem('checkout_amount') || '0.00';
        
        document.getElementById('modeLabel').textContent = mode;
        document.getElementById('amountLabel').textContent = `₹${amount}`;

        // Sequence loaders
        setTimeout(() => {
            document.getElementById('loaderTitle').textContent = 'Authorizing payment...';
        }, 1500);

        setTimeout(() => {
            authorizeAndPlaceOrder(mode);
        }, 3000);
    });

    async function authorizeAndPlaceOrder(mode) {
        // Show success tick
        document.getElementById('paymentLoader').style.display = 'none';
        document.getElementById('paymentSuccess').style.display = 'block';
        
        // Generate random txn ID
        const randomTxn = 'TXN-' + Math.floor(100000 + Math.random() * 900000);
        document.getElementById('txnIdLabel').textContent = randomTxn;

        // Retrieve items and place order
        const items = window.Cart.getItems();
        const custId = localStorage.getItem('checkout_cust_id') || window.Cart.getCustomerId();

        try {
            const response = await fetch('/backend/api/order_actions.php?action=create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-TOKEN': window.csrfToken
                },
                body: new URLSearchParams({
                    Customer_ID: custId,
                    Order_Date: new Date().toISOString().split('T')[0],
                    Status: 'Pending',
                    Payment_Mode: mode,
                    Payment_Status: 'Success',
                    csrf_token: window.csrfToken,
                    ...items.reduce((acc, item, idx) => {
                        acc[`items[${idx}][Product_ID]`] = item.Product_ID;
                        acc[`items[${idx}][Quantity]`] = item.Quantity;
                        return acc;
                    }, {})
                })
            });

            const res = await response.json();
            if (res.success) {
                // Clear cart on success
                window.Cart.clear();
                
                // Clear localStorage parameters
                localStorage.removeItem('checkout_payment_mode');
                localStorage.removeItem('checkout_amount');
                localStorage.removeItem('checkout_cust_id');

                // Redirect to tracking page
                setTimeout(() => {
                    window.location.href = `/customer/orders.html?id=${res.order_id}&track=true`;
                }, 1500);
            } else {
                window.API.showToast(res.message || 'Failed to place order after payment', 'danger');
            }
        } catch (err) {
            console.error(err);
            window.API.showToast('Server connection failed.', 'danger');
        }
    }
</script>
</body>
</html>
