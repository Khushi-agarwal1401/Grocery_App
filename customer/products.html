<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Catalog - FreshCart Premium Storefront</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global Stylesheets -->
    <link href="../assets/css/styles.css" rel="stylesheet">
    <link href="../assets/css/customer.css" rel="stylesheet">
    <script>
        const colorScheme = localStorage.getItem("color-scheme") || "light";
        document.documentElement.setAttribute('data-theme', colorScheme);
    </script>
</head>
<body>

    <!-- Sticky Navigation Header -->
    <nav class="navbar navbar-expand-lg customer-navbar glass-effect" id="mainNavbar">
        <div class="container">
            <!-- Brand Logo -->
            <a class="navbar-brand fw-800 text-success d-flex align-items-center gap-2" href="./index.html" style="font-size: 1.6rem; letter-spacing: -0.03em;">
                <i class="bi bi-cart4 text-success" style="font-size: 1.8rem;"></i>
                <span style="font-family: var(--font-heading); font-weight: 800; color: var(--text-primary);">Fresh<span class="text-success">Cart</span></span>
            </a>

            <!-- Search Input -->
            <div class="mx-lg-4 my-2 my-lg-0 flex-grow-1 d-none d-md-block" style="max-width: 520px;">
                <div class="search-wrapper">
                    <input type="text" class="search-input-premium" id="catalogSearchInput" placeholder="Search fresh vegetables, organic fruits, bakery items...">
                    <i class="bi bi-search search-icon-left"></i>
                </div>
            </div>

            <!-- Right Controls -->
            <div class="d-flex align-items-center gap-3 ms-auto">
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="navbar-action-btn" title="Toggle Theme" type="button">
                    <i class="bi bi-moon-fill"></i>
                </button>

                <!-- Cart Button -->
                <button class="btn cart-btn-premium position-relative" type="button" id="cartToggleBtn">
                    <i class="bi bi-bag-heart me-1"></i>
                    <span class="d-none d-md-inline">Cart</span>
                    <span class="badge cart-badge" id="cartBadgeCount">0</span>
                </button>

                <!-- Profile Dropdown -->
                <div class="dropdown">
                    <button class="btn border-0 d-flex align-items-center gap-2 p-1" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center fw-700" style="width: 40px; height: 40px; border: 2px solid var(--border-color);" id="profileInitial">
                            U
                        </div>
                        <span class="d-none d-lg-inline fw-600 text-secondary" id="userDropdownName">User</span>
                        <i class="bi bi-chevron-down text-secondary fs-8 d-none d-lg-inline"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item py-2 fw-600" href="./profile.html"><i class="bi bi-person me-2 text-success"></i> My Profile</a></li>
                        <li><a class="dropdown-item py-2 fw-600" href="./orders.html"><i class="bi bi-bag-check me-2 text-success"></i> My Orders</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 fw-600 text-danger" href="#" id="customerSignOutBtn"><i class="bi bi-box-arrow-right me-2"></i> Sign Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container my-4 pb-5">
        
        <!-- Mobile Search Bar -->
        <div class="mb-4 d-md-none">
            <div class="search-wrapper">
                <input type="text" class="search-input-premium" id="mobileCatalogSearchInput" placeholder="Search vegetables, fruits, dairy...">
                <i class="bi bi-search search-icon-left"></i>
            </div>
        </div>

        <div class="row g-4">
            <!-- Sidebar Filters Area -->
            <div class="col-12 col-lg-3">
                <div class="card-premium p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4 pb-2 border-bottom border-secondary-subtle">
                        <h5 class="fw-800 mb-0">Filters</h5>
                        <button class="btn btn-link btn-sm text-decoration-none text-success fw-800 p-0" id="clearFiltersBtn">Clear All</button>
                    </div>

                    <!-- Categories Filter -->
                    <div class="mb-4">
                        <h6 class="fw-800 text-secondary mb-3">Categories</h6>
                        <div id="categoryFilterContainer" style="max-height: 240px; overflow-y: auto; padding-right: 5px;">
                            <!-- Checkboxes populated dynamically -->
                            <span class="text-secondary small">Loading categories...</span>
                        </div>
                    </div>

                    <!-- Price Range Filter -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-2">
                            <h6 class="fw-800 text-secondary mb-0">Max Price</h6>
                            <span class="fw-800 text-success" id="priceLabel">₹1000</span>
                        </div>
                        <input type="range" class="form-range" id="priceRange" min="10" max="1000" step="10" value="1000">
                        <div class="d-flex justify-content-between text-secondary small mt-1">
                            <span>₹10</span>
                            <span>₹1000</span>
                        </div>
                    </div>

                    <!-- Stock Availability Filter -->
                    <div class="mb-2">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="stockFilter">
                            <label class="form-check-label fw-700 text-secondary cursor-pointer" for="stockFilter">
                                Exclude Out of Stock
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Products Catalog Grid -->
            <div class="col-12 col-lg-9">
                <!-- Sorting & Details Info -->
                <div class="card-premium p-3 mb-4 d-flex flex-wrap flex-sm-nowrap align-items-center justify-content-between gap-3">
                    <div class="text-secondary fw-600">
                        Showing <strong class="text-success" id="resultsCount">0</strong> organic items
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="sortBySelect" class="text-secondary fw-700 mb-0" style="white-space: nowrap; font-size: 0.85rem;">Sort By:</label>
                        <select class="form-select form-select-sm" id="sortBySelect" style="width: 170px; border-radius: 10px; border-color: var(--border-color);">
                            <option value="name_asc" selected>Product: A-Z</option>
                            <option value="name_desc">Product: Z-A</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                        </select>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4" id="catalogGrid">
                    <!-- Skeletons -->
                    <div class="col"><div class="card skeleton-pulse" style="height: 340px;"></div></div>
                    <div class="col"><div class="card skeleton-pulse" style="height: 340px;"></div></div>
                    <div class="col"><div class="card skeleton-pulse" style="height: 340px;"></div></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Slide-in Cart Drawer Layout -->
    <div class="cart-drawer-backdrop" id="cartDrawerBackdrop"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-drawer-header">
            <h5 class="fw-800 text-secondary mb-0"><i class="bi bi-bag-heart text-success me-2"></i>My Cart</h5>
            <button type="button" class="btn-close" id="cartCloseBtn" aria-label="Close"></button>
        </div>
        <div class="cart-drawer-body" id="cartDrawerBody">
            <!-- Items loaded dynamically -->
        </div>
        <div class="cart-drawer-footer" id="cartDrawerFooter">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-secondary fw-500">Subtotal</span>
                <span class="fw-700" id="cartSubtotal">₹0.00</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
                <span class="text-secondary fw-500">GST (5%) & Delivery</span>
                <span class="fw-700" id="cartTaxes">₹0.00</span>
            </div>
            <div class="d-flex justify-content-between mb-4 border-top pt-3 border-secondary-subtle">
                <h5 class="fw-700 text-secondary mb-0">Grand Total</h5>
                <h4 class="fw-800 text-success mb-0" id="cartGrandTotal">₹0.00</h4>
            </div>
            <button class="btn btn-premium w-100 py-3 fw-700" id="checkoutBtn" disabled>Proceed to Checkout</button>
        </div>
    </div>

    <!-- Mobile Bottom Navigation (Blinkit style) -->
    <div class="mobile-bottom-nav d-md-none">
        <a href="./index.html" class="mobile-nav-item">
            <i class="bi bi-house-door"></i>
            <span>Home</span>
        </a>
        <a href="./products.html" class="mobile-nav-item active">
            <i class="bi bi-search"></i>
            <span>Search</span>
        </a>
        <a href="./orders.html" class="mobile-nav-item">
            <i class="bi bi-receipt"></i>
            <span>Orders</span>
        </a>
        <a href="./profile.html" class="mobile-nav-item">
            <i class="bi bi-person"></i>
            <span>Profile</span>
        </a>
        <a href="#" class="mobile-nav-item" id="mobileCartTrigger">
            <i class="bi bi-bag-heart"></i>
            <span>Cart</span>
        </a>
    </div>

    <!-- Mobile Floating Quick Cart Badge -->
    <a href="#" class="mobile-floating-cart-badge" id="mobileFloatingCart">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-bag-check fs-5"></i>
            <div>
                <span class="fw-800 d-block" id="mobileCartItemCount">0 Items</span>
                <span class="small opacity-75" id="mobileCartTotalAmount">₹0.00</span>
            </div>
        </div>
        <div class="fw-800 d-flex align-items-center gap-1">
            <span>View Cart</span>
            <i class="bi bi-chevron-right"></i>
        </div>
    </a>

    <!-- JS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/products.js"></script>
    <script src="../assets/js/cart.js"></script>
    
    <script>
        let allProducts = [];
        let activeFilters = {
            search: '',
            categoryIds: [],
            minPrice: 0,
            maxPrice: 1000,
            inStockOnly: false,
            sortBy: 'name_asc'
        };

        document.addEventListener('DOMContentLoaded', async () => {
            // Shrink navbar on scroll
            const navbar = document.getElementById('mainNavbar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('navbar-shrink');
                } else {
                    navbar.classList.remove('navbar-shrink');
                }
            });

            // Load filters and data
            await initFilters();
            await loadCatalog();
            updateCartUI();

            // Cart Drawer events
            const cartToggle = document.getElementById('cartToggleBtn');
            const mobileCartTrigger = document.getElementById('mobileCartTrigger');
            const mobileFloatingCart = document.getElementById('mobileFloatingCart');
            const cartClose = document.getElementById('cartCloseBtn');
            const backdrop = document.getElementById('cartDrawerBackdrop');
            const drawer = document.getElementById('cartDrawer');

            const openDrawer = (e) => {
                if (e) e.preventDefault();
                drawer.classList.add('show');
                backdrop.classList.add('show');
                updateCartUI();
            };

            const closeDrawer = () => {
                drawer.classList.remove('show');
                backdrop.classList.remove('show');
            };

            cartToggle.addEventListener('click', openDrawer);
            if(mobileCartTrigger) mobileCartTrigger.addEventListener('click', openDrawer);
            if(mobileFloatingCart) mobileFloatingCart.addEventListener('click', openDrawer);
            cartClose.addEventListener('click', closeDrawer);
            backdrop.addEventListener('click', closeDrawer);

            // Listen to cart update event
            window.addEventListener('cart-updated', () => {
                updateCartUI();
            });

            // Bind filter inputs
            const searchHandler = (e) => {
                activeFilters.search = e.target.value;
                applyFilters();
            };
            document.getElementById('catalogSearchInput').addEventListener('input', searchHandler);
            document.getElementById('mobileCatalogSearchInput').addEventListener('input', searchHandler);

            document.getElementById('priceRange').addEventListener('input', (e) => {
                const val = e.target.value;
                document.getElementById('priceLabel').textContent = `₹${val}`;
                activeFilters.maxPrice = val;
                applyFilters();
            });

            document.getElementById('stockFilter').addEventListener('change', (e) => {
                activeFilters.inStockOnly = e.target.checked;
                applyFilters();
            });

            document.getElementById('sortBySelect').addEventListener('change', (e) => {
                activeFilters.sortBy = e.target.value;
                applyFilters();
            });

            document.getElementById('clearFiltersBtn').addEventListener('click', () => {
                clearAllFilters();
            });

            // Theme toggler
            document.getElementById('theme-toggle').addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('color-scheme', newTheme);
            });

            // Checkout btn click
            document.getElementById('checkoutBtn').addEventListener('click', () => {
                window.location.href = './checkout.html';
            });

            // Sign out
            document.getElementById('customerSignOutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.Auth.logout(false);
            });
        });

        async function initFilters() {
            try {
                // Fetch categories
                const categories = await window.Products.fetchCategories();
                const container = document.getElementById('categoryFilterContainer');
                container.innerHTML = '';
                
                // Read URL parameters for pre-filters
                const urlParams = new URLSearchParams(window.location.search);
                const preCatId = urlParams.get('category');
                const preSearch = urlParams.get('search');

                if (preSearch) {
                    activeFilters.search = preSearch;
                    document.getElementById('catalogSearchInput').value = preSearch;
                    document.getElementById('mobileCatalogSearchInput').value = preSearch;
                }

                categories.forEach(c => {
                    const isChecked = preCatId && parseInt(preCatId) === parseInt(c.Category_ID);
                    if (isChecked) {
                        activeFilters.categoryIds.push(parseInt(c.Category_ID));
                    }
                    
                    container.innerHTML += `
                        <div class="form-check mb-2">
                            <input class="form-check-input category-checkbox" type="checkbox" value="${c.Category_ID}" id="cat_cb_${c.Category_ID}" ${isChecked ? 'checked' : ''} onchange="toggleCategoryFilter(this)">
                            <label class="form-check-label text-secondary fw-600 cursor-pointer" for="cat_cb_${c.Category_ID}">
                                ${c.Category_Name}
                            </label>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function loadCatalog() {
            try {
                allProducts = await window.Products.fetchAll();
                applyFilters();
            } catch (err) {
                console.error(err);
            }
        }

        function toggleCategoryFilter(checkbox) {
            const val = parseInt(checkbox.value);
            if (checkbox.checked) {
                activeFilters.categoryIds.push(val);
            } else {
                activeFilters.categoryIds = activeFilters.categoryIds.filter(id => id !== val);
            }
            applyFilters();
        }

        function applyFilters() {
            const filtered = window.Products.filterProducts(allProducts, activeFilters);
            document.getElementById('resultsCount').textContent = filtered.length;
            
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-12 py-5 text-center">
                        <div class="empty-state border-0 bg-transparent">
                            <i class="bi bi-search fs-1 text-tertiary"></i>
                            <h5 class="mt-3">No Products Match Filters</h5>
                            <p class="small text-secondary mb-0">Try adjusting your checkboxes or price limits.</p>
                        </div>
                    </div>
                `;
                return;
            }

            filtered.forEach(p => {
                grid.appendChild(createProductCard(p));
            });
        }

        function createProductCard(p) {
            const col = document.createElement('div');
            col.className = 'col';

            const outOfStock = parseInt(p.Stock) <= 0;
            const fallbackHtml = window.Products.getProductPlaceholder(p.Category_Name, p.Product_Name);
            const imgPath = `../uploads/product_${p.Product_ID}.jpg`;

            const hasDiscount = (p.Product_ID % 3 === 0);
            const discountPct = (p.Product_ID % 2 === 0) ? 10 : 15;
            const discountBadge = hasDiscount ? `<div class="product-badge-discount">SAVE ${discountPct}%</div>` : '';
            const oldPrice = hasDiscount ? `<span class="text-decoration-line-through text-tertiary small me-1">₹${(p.Price * 1.15).toFixed(2)}</span>` : '';
            const rating = (4.5 + (p.Product_ID % 5) * 0.1).toFixed(1);

            col.innerHTML = `
                <div class="product-grid-card">
                    ${discountBadge}
                    <button class="wishlist-btn" onclick="toggleWishlist(this, ${p.Product_ID})" aria-label="Add to Wishlist">
                        <i class="bi bi-heart"></i>
                    </button>
                    <div class="product-image-container cursor-pointer" onclick="goToDetails(${p.Product_ID})">
                        <img src="${imgPath}" onerror="this.outerHTML='${fallbackHtml.replace(/'/g, "\\'")}'" alt="${p.Product_Name}">
                        <div class="product-eta-badge">
                            <i class="bi bi-lightning-fill text-warning"></i>
                            <span>10 MINS</span>
                        </div>
                    </div>
                    <div class="product-category">${p.Category_Name}</div>
                    <div class="product-title" onclick="goToDetails(${p.Product_ID})">${p.Product_Name}</div>
                    <div class="product-rating-bar">
                        <i class="bi bi-star-fill"></i>
                        <span>${rating}</span>
                        <span class="text-tertiary">(${p.Product_ID * 12 + 8})</span>
                    </div>
                    <div class="product-price-action">
                        <div class="product-price-container">
                            <span class="product-price">${oldPrice}₹${parseFloat(p.Price).toFixed(2)}</span>
                            <span class="product-weight">1 unit / pkg</span>
                        </div>
                        ${outOfStock ? `
                            <button class="btn btn-sm btn-outline-secondary" disabled>Sold Out</button>
                        ` : `
                            <button class="btn btn-add-cart-premium" onclick="addToCart(event, ${p.Product_ID})">
                                <i class="bi bi-plus-lg"></i><span>Add</span>
                            </button>
                        `}
                    </div>
                </div>
            `;
            return col;
        }

        function goToDetails(id) {
            window.location.href = `./product-details.html?id=${id}`;
        }

        function toggleWishlist(btn, id) {
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            if (btn.classList.contains('active')) {
                icon.className = 'bi bi-heart-fill';
                window.API.showToast('Item added to wishlist!', 'success');
            } else {
                icon.className = 'bi bi-heart';
                window.API.showToast('Item removed from wishlist.', 'info');
            }
        }

        async function addToCart(e, id) {
            e.stopPropagation();
            try {
                const product = await window.Products.fetchDetails(id);
                if (product) {
                    window.Cart.add(product, 1);
                    window.API.showToast(`${product.Product_Name} added to cart!`, 'success');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function clearAllFilters() {
            activeFilters = {
                search: '',
                categoryIds: [],
                minPrice: 0,
                maxPrice: 1000,
                inStockOnly: false,
                sortBy: 'name_asc'
            };
            
            document.getElementById('catalogSearchInput').value = '';
            document.getElementById('mobileCatalogSearchInput').value = '';
            document.getElementById('priceRange').value = 1000;
            document.getElementById('priceLabel').textContent = '₹1000';
            document.getElementById('stockFilter').checked = false;
            document.getElementById('sortBySelect').value = 'name_asc';

            const checkboxes = document.querySelectorAll('.category-checkbox');
            checkboxes.forEach(cb => cb.checked = false);

            applyFilters();
        }

        // --- Cart Drawer Updates ---
        function updateCartUI() {
            const count = window.Cart.getCount();
            document.getElementById('cartBadgeCount').textContent = count;
            
            const mobileCount = document.getElementById('mobileCartItemCount');
            const mobileTotal = document.getElementById('mobileCartTotalAmount');
            const mobileFloatingCart = document.getElementById('mobileFloatingCart');
            
            const tbody = document.getElementById('cartDrawerBody');
            const items = window.Cart.getItems();
            
            tbody.innerHTML = '';
            
            if (items.length === 0) {
                tbody.innerHTML = `
                    <div class="py-5 text-center text-secondary">
                        <i class="bi bi-bag-x fs-1 d-block mb-3 text-tertiary"></i>
                        <h5>Your cart is empty</h5>
                        <p class="small mb-0">Add fresh groceries to get started.</p>
                    </div>
                `;
                document.getElementById('cartSubtotal').textContent = '₹0.00';
                document.getElementById('cartTaxes').textContent = '₹0.00';
                document.getElementById('cartGrandTotal').textContent = '₹0.00';
                document.getElementById('checkoutBtn').disabled = true;
                
                if (mobileFloatingCart) mobileFloatingCart.classList.remove('show');
                return;
            }

            items.forEach(item => {
                const itemSub = item.Price * item.Quantity;
                const fallbackHtml = window.Products.getProductPlaceholder(item.Category_Name, item.Product_Name);
                const imgPath = `../uploads/product_${item.Product_ID}.jpg`;

                tbody.innerHTML += `
                    <div class="cart-item-row">
                        <div class="cart-item-img">
                            <img src="${imgPath}" onerror="this.outerHTML='${fallbackHtml.replace(/'/g, "\\'")}'">
                        </div>
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.Product_Name}</div>
                            <div class="d-flex align-items-center justify-content-between mt-2">
                                <div class="qty-selector">
                                    <button class="qty-btn" onclick="updateCartItemQty(${item.Product_ID}, ${item.Quantity - 1})">-</button>
                                    <span class="qty-val">${item.Quantity}</span>
                                    <button class="qty-btn" onclick="updateCartItemQty(${item.Product_ID}, ${item.Quantity + 1})">+</button>
                                </div>
                                <span class="cart-item-price">₹${parseFloat(itemSub).toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            const totals = window.Cart.getTotals();
            document.getElementById('cartSubtotal').textContent = `₹${totals.subtotal.toFixed(2)}`;
            
            let taxDeliveryText = `₹${totals.tax.toFixed(2)}`;
            if (totals.deliveryFee > 0) {
                taxDeliveryText += ` (+ ₹${totals.deliveryFee.toFixed(2)} delivery)`;
            } else {
                taxDeliveryText += ` (Free delivery)`;
            }
            
            document.getElementById('cartTaxes').textContent = taxDeliveryText;
            document.getElementById('cartGrandTotal').textContent = `₹${totals.total.toFixed(2)}`;
            document.getElementById('checkoutBtn').disabled = false;

            if (mobileCount && mobileTotal && mobileFloatingCart) {
                mobileCount.textContent = `${count} ${count === 1 ? 'Item' : 'Items'}`;
                mobileTotal.textContent = `₹${totals.total.toFixed(2)}`;
                mobileFloatingCart.classList.add('show');
            }
        }

        function updateCartItemQty(id, qty) {
            window.Cart.updateQty(id, qty);
        }
    </script>
</body>
</html>
