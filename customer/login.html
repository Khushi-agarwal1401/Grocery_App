<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FreshCart Premium Storefront</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global Stylesheets -->
    <link href="/assets/css/styles.css" rel="stylesheet">
    <link href="/assets/css/customer.css" rel="stylesheet">
    <script>
        const colorScheme = localStorage.getItem("color-scheme") || "light";
        document.documentElement.setAttribute('data-theme', colorScheme);
    </script>
    <style>
        body {
            background: radial-gradient(circle at 10% 20%, rgba(var(--primary-rgb), 0.08) 0%, rgba(0, 0, 0, 0) 60%), var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 1.5rem;
        }

        .login-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(var(--primary-rgb), 0.15) 0%, rgba(var(--primary-rgb), 0) 70%);
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
        }
        .login-orb-1 { top: -10%; right: -5%; }
        .login-orb-2 { bottom: -10%; left: -5%; }

        .login-card-premium {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: var(--shadow-deep);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 460px;
            z-index: 10;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        .login-logo {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--primary);
            font-family: var(--font-heading);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            text-decoration: none;
        }

        .login-logo i {
            animation: logo-float 4s ease-in-out infinite;
        }

        @keyframes logo-float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-4px) rotate(5deg); }
        }

        .form-label-premium {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .input-group-premium {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group-premium i {
            position: absolute;
            left: 1.25rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .form-control-premium {
            background-color: var(--bg-tertiary);
            border: 1px solid transparent;
            color: var(--text-primary);
            border-radius: 14px;
            padding: 0.85rem 1.25rem 0.85rem 3rem;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            width: 100%;
        }

        .form-control-premium:focus {
            outline: none;
            background-color: var(--bg-secondary);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.12);
        }

        .form-control-premium:focus + i {
            color: var(--primary);
        }

        .password-toggle-btn {
            position: absolute;
            right: 1.25rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 10;
        }

        .password-toggle-btn:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>

    <div class="login-card-premium">
        <div class="text-center mb-4">
            <a href="/customer/index.html" class="login-logo">
                <i class="bi bi-cart4"></i>
                <span>FreshCart</span>
            </a>
            <h5 class="fw-800 text-secondary mb-1">Welcome Back!</h5>
            <p class="text-secondary small">Sign in to experience instant grocery delivery</p>
        </div>
        
        <form id="customerLoginForm" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label-premium">Username</label>
                <div class="input-group-premium">
                    <input type="text" class="form-control-premium" id="username" name="username" placeholder="Enter shopper username (user)" required>
                    <i class="bi bi-person"></i>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label-premium">Password</label>
                <div class="input-group-premium">
                    <input type="password" class="form-control-premium" id="password" name="password" placeholder="Enter password (user123)" required style="padding-right: 3rem;">
                    <i class="bi bi-lock"></i>
                    <button class="password-toggle-btn" type="button" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                    <label class="form-check-label text-secondary fw-500 small cursor-pointer" for="remember_me">Remember me</label>
                </div>
                <button type="button" class="btn btn-link p-0 text-decoration-none text-success fw-700 small" id="goToAdmin">Admin Portal <i class="bi bi-arrow-right"></i></button>
            </div>
            
            <button type="submit" class="btn btn-premium w-100 py-3 fw-700 shadow-sm d-flex align-items-center justify-content-center gap-2">
                <span>Sign In to Shop</span>
                <i class="bi bi-arrow-right-short fs-5"></i>
            </button>
        </form>
    </div>

    <!-- JS Modules -->
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Toggle password
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            if (togglePassword && password) {
                togglePassword.addEventListener('click', function() {
                    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                    password.setAttribute('type', type);
                    const icon = this.querySelector('i');
                    icon.classList.toggle('bi-eye');
                    icon.classList.toggle('bi-eye-slash');
                });
            }

            // Form Submission
            const form = document.getElementById('customerLoginForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const passwordVal = password.value;
                const rememberMe = document.getElementById('remember_me').checked;

                if (!username || !passwordVal) {
                    window.API.showToast('Please fill in both fields.', 'warning');
                    return;
                }

                try {
                    // Log in shopper (regular user)
                    await window.Auth.login(username, passwordVal, rememberMe, false);
                } catch (err) {
                    // Handled by API wrapper
                }
            });

            // Go to Admin portal login
            document.getElementById('goToAdmin').addEventListener('click', () => {
                window.location.href = '/admin/login.html';
            });
        });
    </script>
</body>
</html>
