<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Admin Panel - Customers</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.bootstrap5.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
    <!-- Dynamically Injected Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <!-- Dynamically Injected Navbar -->
        <div id="navbar-container"></div>
        
        <main class="content-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-700 text-primary mb-0"><i class="bi bi-people me-2"></i>Customer Management</h3>
                <button type="button" class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg me-2"></i>Add Customer
                </button>
            </div>

            <div class="custom-card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="customersTable" class="table table-hover table-striped w-100">
                            <thead>
                                <tr>
                                    <th style="width: 8%;">ID</th>
                                    <th style="width: 22%;">Name</th>
                                    <th style="width: 25%;">Email</th>
                                    <th style="width: 15%;">Phone</th>
                                    <th style="width: 18%;">Registered Date</th>
                                    <th style="width: 12%; text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="customersTableBody">
                                <!-- Loaded dynamically via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal fade" id="customerModal" tabindex="-1" aria-labelledby="customerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-600" id="customerModalLabel">Add Customer</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="customerForm">
                <input type="hidden" name="csrf_token" id="formCsrfToken" value="">
                <input type="hidden" name="Customer_ID" id="customerId" value="">
                
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="customerName" class="form-label fw-500">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="customerName" name="Name" placeholder="e.g. Aarav Sharma" required>
                    </div>
                    <div class="mb-3">
                        <label for="customerEmail" class="form-label fw-500">Email Address</label>
                        <input type="email" class="form-control" id="customerEmail" name="Email" placeholder="e.g. aarav@gmail.com">
                    </div>
                    <div class="mb-3">
                        <label for="customerPhone" class="form-label fw-500">Phone Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="customerPhone" name="Phone" placeholder="e.g. 9876500001" required>
                    </div>
                    <div class="mb-3">
                        <label for="customerAddress" class="form-label fw-500">Address</label>
                        <textarea class="form-control" id="customerAddress" name="Address" rows="2" placeholder="Customer address details..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="customerRegDate" class="form-label fw-500">Registration Date</label>
                        <input type="date" class="form-control" id="customerRegDate" name="Registered_Date" value="">
                    </div>
                </div>
                
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Customer History Modal -->
<div class="modal fade" id="historyModal" tabindex="-1" aria-labelledby="historyModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-600" id="historyModalLabel">Customer Order History</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="stat-card card-order py-3">
                            <div class="stat-value fs-4" id="histOrderCount">0</div>
                            <div class="stat-label">Total Orders Placed</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card card-revenue py-3">
                            <div class="stat-value fs-4" id="histTotalSpent">₹0.00</div>
                            <div class="stat-label">Total Amount Spent</div>
                        </div>
                    </div>
                </div>
                
                <h6 class="fw-700 text-primary mb-3"><i class="bi bi-clock-history me-2"></i>Recent Orders</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-striped">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Order Date</th>
                                <th>Total Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="orderHistoryBody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>

<!-- Layout scripting -->
<script src="../assets/js/main.js"></script>
<script src="../assets/js/layout.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadCustomers();
    
    setTimeout(() => {
        document.getElementById('formCsrfToken').value = window.csrfToken;
    }, 400);
    
    document.getElementById('customerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveCustomer();
    });
});

function loadCustomers() {
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=customers&action=list')
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast(res.message, 'danger');
                return;
            }
            
            if ($.fn.DataTable.isDataTable('#customersTable')) {
                $('#customersTable').DataTable().destroy();
            }
            
            const tbody = document.getElementById('customersTableBody');
            tbody.innerHTML = '';
            
            res.data.forEach(cust => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${cust.Customer_ID}</td>
                    <td class="fw-600">${escapeHtml(cust.Name)}</td>
                    <td>${escapeHtml(cust.Email || 'N/A')}</td>
                    <td>${escapeHtml(cust.Phone)}</td>
                    <td>${cust.Registered_Date}</td>
                    <td class="text-center">
                        <div class="btn-group gap-2">
                            <button class="btn btn-sm btn-outline-primary rounded" onclick="viewHistory(${cust.Customer_ID})" title="Order History">
                                <i class="bi bi-clock-history"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-info rounded" onclick="openEditModal(${cust.Customer_ID}, '${escapeJs(cust.Name)}', '${escapeJs(cust.Email || '')}', '${escapeJs(cust.Phone)}', '${escapeJs(cust.Address || '')}', '${cust.Registered_Date}')" title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded" onclick="deleteCustomer(${cust.Customer_ID})" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            $('#customersTable').DataTable({
                dom: 'Bfrtip',
                buttons: [
                    { extend: 'csv', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'excel', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'pdf', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'print', className: 'btn btn-sm btn-outline-primary' }
                ],
                pageLength: 10,
                responsive: true
            });
        })
        .catch(err => {
            hideLoader();
            showToast('Error loading customers data', 'danger');
            console.error(err);
        });
}

function openCreateModal() {
    document.getElementById('customerId').value = '';
    document.getElementById('customerName').value = '';
    document.getElementById('customerEmail').value = '';
    document.getElementById('customerPhone').value = '';
    document.getElementById('customerAddress').value = '';
    
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('customerRegDate').value = today;
    document.getElementById('customerModalLabel').innerText = 'Add Customer';
    
    const modal = new bootstrap.Modal(document.getElementById('customerModal'));
    modal.show();
}

function openEditModal(id, name, email, phone, address, regDate) {
    document.getElementById('customerId').value = id;
    document.getElementById('customerName').value = name;
    document.getElementById('customerEmail').value = email;
    document.getElementById('customerPhone').value = phone;
    document.getElementById('customerAddress').value = address;
    document.getElementById('customerRegDate').value = regDate;
    document.getElementById('customerModalLabel').innerText = 'Edit Customer';
    
    const modal = new bootstrap.Modal(document.getElementById('customerModal'));
    modal.show();
}

function saveCustomer() {
    const form = document.getElementById('customerForm');
    const formData = new FormData(form);
    
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=customers&action=save', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(res => {
        hideLoader();
        if (res.success) {
            showToast(res.message, 'success');
            bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
            loadCustomers();
        } else {
            showToast(res.message, 'danger');
        }
    })
    .catch(err => {
        hideLoader();
        showToast('Error saving customer', 'danger');
        console.error(err);
    });
}

function deleteCustomer(id) {
    confirmAction('Are you sure you want to delete this customer?', function() {
        const formData = new FormData();
        formData.append('id', id);
        formData.append('csrf_token', window.csrfToken);
        
        showLoader();
        fetch('../../backend/api/crud_handlers.php?module=customers&action=delete', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (res.success) {
                showToast(res.message, 'success');
                loadCustomers();
            } else {
                showToast(res.message, 'danger');
            }
        })
        .catch(err => {
            hideLoader();
            showToast('Error deleting customer', 'danger');
            console.error(err);
        });
    });
}

function viewHistory(id) {
    showLoader();
    fetch(`../api/crud_handlers.php?module=customers&action=get&id=${id}`)
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast('Failed to fetch customer history', 'danger');
                return;
            }
            
            const cust = res.data;
            document.getElementById('historyModalLabel').innerText = `${escapeHtml(cust.Name)} - Order History`;
            document.getElementById('histOrderCount').innerText = cust.stats.OrderCount;
            document.getElementById('histTotalSpent').innerText = '₹' + parseFloat(cust.stats.TotalSpent).toFixed(2);
            
            const tbody = document.getElementById('orderHistoryBody');
            tbody.innerHTML = '';
            
            if (cust.orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-secondary">No orders found for this customer.</td></tr>';
            } else {
                cust.orders.forEach(o => {
                    let badgeClass = 'badge-pending';
                    if (o.Status === 'Delivered') badgeClass = 'badge-delivered';
                    if (o.Status === 'Shipped') badgeClass = 'badge-shipped';
                    if (o.Status === 'Cancelled') badgeClass = 'badge-cancelled';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${o.Order_ID}</td>
                        <td>${o.Order_Date}</td>
                        <td class="fw-600">₹${parseFloat(o.Total_Amount).toFixed(2)}</td>
                        <td>
                            <span class="badge-status ${badgeClass}">${o.Status}</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            
            const modal = new bootstrap.Modal(document.getElementById('historyModal'));
            modal.show();
        })
        .catch(err => {
            hideLoader();
            showToast('Error fetching customer history', 'danger');
            console.error(err);
        });
}

function escapeHtml(text) {
    if (!text) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.toString().replace(/[&<>"']/g, m => map[m]);
}

function escapeJs(text) {
    if (!text) return '';
    return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}
</script>

</body>
</html>
