<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Admin Panel - Sign In</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Stylesheet -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- Layout container -->
<div class="login-container">
    <div class="login-card glass-effect">
        <div class="p-4 text-center border-bottom border-secondary-subtle">
            <h3 class="fw-800 text-primary mb-1"><i class="bi bi-cart4 me-2"></i>GROCERY ADMIN</h3>
            <p class="text-secondary mb-0">Sign in to manage your inventory & orders</p>
        </div>
        
        <div class="p-4">
            <!-- Dynamic Alert Banner -->
            <div id="errorAlert" class="alert alert-danger border-0 py-2 d-none d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div id="errorMessage"></div>
            </div>
            
            <form id="loginForm" novalidate>
                <input type="hidden" id="csrfToken" name="csrf_token" value="">
                
                <div class="mb-3">
                    <label for="username" class="form-label fw-500 text-secondary">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-person text-secondary"></i></span>
                        <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter username" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label fw-500 text-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-color"><i class="bi bi-lock text-secondary"></i></span>
                        <input type="password" class="form-control border-start-0 border-end-0" id="password" name="password" placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary border-start-0 border-color" type="button" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                        <label class="form-check-label text-secondary fw-500" for="remember_me">Remember me</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-600">Sign In</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Loader scripting -->
<script src="../assets/js/main.js"></script>
<!-- Dynamic layout controller -->
<script src="../assets/js/layout.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Fetch and assign CSRF token on load
    setTimeout(() => {
        const tokenInput = document.getElementById('csrfToken');
        if (tokenInput) {
            tokenInput.value = window.csrfToken;
        }
    }, 300);

    // Toggle Password visibility
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');
    if (togglePassword && password) {
        togglePassword.addEventListener('click', function() {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.querySelector('i').classList.toggle('bi-eye');
            this.querySelector('i').classList.toggle('bi-eye-slash');
        });
    }

    // Login Form Submit via AJAX
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const form = this;
        const formData = new FormData(form);
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        
        errorAlert.classList.add('d-none');
        showLoader();
        
        fetch('../../backend/api/login_handler.php', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (res.success) {
                window.location.href = '../dashboard/index.html';
            } else {
                errorMessage.innerText = res.message;
                errorAlert.classList.remove('d-none');
            }
        })
        .catch(err => {
            hideLoader();
            errorMessage.innerText = 'Server error. Please try again.';
            errorAlert.classList.remove('d-none');
            console.error(err);
        });
    });
});
</script>

</body>
</html>
