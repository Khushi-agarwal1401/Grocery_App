<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Admin Panel - Delivery Agents</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.bootstrap5.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
    <!-- Dynamically Injected Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <!-- Dynamically Injected Navbar -->
        <div id="navbar-container"></div>
        
        <main class="content-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-700 text-primary mb-0"><i class="bi bi-bicycle me-2"></i>Delivery Agent Management</h3>
                <button type="button" class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg me-2"></i>Add Agent
                </button>
            </div>

            <div class="custom-card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="agentsTable" class="table table-hover table-striped w-100">
                            <thead>
                                <tr>
                                    <th style="width: 10%;">ID</th>
                                    <th style="width: 30%;">Agent Name</th>
                                    <th style="width: 25%;">Phone Number</th>
                                    <th style="width: 20%;">Vehicle No</th>
                                    <th style="width: 15%; text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="agentsTableBody">
                                <!-- Loaded dynamically via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal fade" id="agentModal" tabindex="-1" aria-labelledby="agentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-600" id="agentModalLabel">Add Agent</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="agentForm">
                <input type="hidden" name="csrf_token" id="formCsrfToken" value="">
                <input type="hidden" name="Agent_ID" id="agentId" value="">
                
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="agentName" class="form-label fw-500">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="agentName" name="Name" placeholder="e.g. Rahul Sharma" required>
                    </div>
                    <div class="mb-3">
                        <label for="agentPhone" class="form-label fw-500">Phone Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="agentPhone" name="Phone" placeholder="e.g. 9878100001" required>
                    </div>
                    <div class="mb-3">
                        <label for="agentVehicle" class="form-label fw-500">Vehicle Number</label>
                        <input type="text" class="form-control" id="agentVehicle" name="Vehicle_No" placeholder="e.g. MH12AB1001">
                    </div>
                </div>
                
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Agent</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Performance Analytics Modal -->
<div class="modal fade" id="performanceModal" tabindex="-1" aria-labelledby="performanceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-600" id="performanceModalLabel">Delivery Performance & History</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Stats row -->
                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-3">
                        <div class="stat-card card-order py-3">
                            <div class="stat-value fs-4" id="perfTotalDeliveries">0</div>
                            <div class="stat-label">Total Deliveries</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <div class="stat-card card-revenue py-3">
                            <div class="stat-value fs-4" id="perfCompletedDeliveries">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <div class="stat-card card-product py-3">
                            <div class="stat-value fs-4" id="perfActiveDeliveries">0</div>
                            <div class="stat-label">Active Load</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <div class="stat-card card-customer py-3">
                            <div class="stat-value fs-4" id="perfSuccessRate">100%</div>
                            <div class="stat-label">Success Rate</div>
                        </div>
                    </div>
                </div>
                
                <h6 class="fw-700 text-primary mb-3"><i class="bi bi-clock-history me-2"></i>Assigned Delivery Orders</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-striped">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Name</th>
                                <th>Order Date</th>
                                <th>Amount</th>
                                <th>Delivery Status</th>
                            </tr>
                        </thead>
                        <tbody id="assignedOrdersBody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables Core & Extensions -->
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>

<!-- Global layout controllers -->
<script src="../assets/js/main.js"></script>
<script src="../assets/js/layout.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadAgents();
    
    // Assign CSRF token
    setTimeout(() => {
        document.getElementById('formCsrfToken').value = window.csrfToken;
    }, 500);

    document.getElementById('agentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveAgent();
    });
});

function loadAgents() {
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=delivery_agents&action=list')
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast(res.message, 'danger');
                return;
            }
            
            if ($.fn.DataTable.isDataTable('#agentsTable')) {
                $('#agentsTable').DataTable().destroy();
            }
            
            const tbody = document.getElementById('agentsTableBody');
            tbody.innerHTML = '';
            
            res.data.forEach(agent => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${agent.Agent_ID}</td>
                    <td class="fw-600">${escapeHtml(agent.Name)}</td>
                    <td>${escapeHtml(agent.Phone)}</td>
                    <td>${escapeHtml(agent.Vehicle_No || 'N/A')}</td>
                    <td class="text-center">
                        <div class="btn-group gap-2">
                            <button class="btn btn-sm btn-outline-primary rounded" onclick="viewPerformance(${agent.Agent_ID})" title="View Deliveries">
                                <i class="bi bi-graph-up-arrow"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-info rounded" onclick="openEditModal(${agent.Agent_ID}, '${escapeJs(agent.Name)}', '${escapeJs(agent.Phone)}', '${escapeJs(agent.Vehicle_No || '')}')" title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded" onclick="deleteAgent(${agent.Agent_ID})" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            $('#agentsTable').DataTable({
                dom: 'Bfrtip',
                buttons: [
                    { extend: 'csv', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'excel', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'pdf', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'print', className: 'btn btn-sm btn-outline-primary' }
                ],
                pageLength: 10,
                responsive: true
            });
        })
        .catch(err => {
            hideLoader();
            showToast('Error loading agents data', 'danger');
            console.error(err);
        });
}

function openCreateModal() {
    document.getElementById('agentId').value = '';
    document.getElementById('agentName').value = '';
    document.getElementById('agentPhone').value = '';
    document.getElementById('agentVehicle').value = '';
    document.getElementById('agentModalLabel').innerText = 'Add Delivery Agent';
    
    const modal = new bootstrap.Modal(document.getElementById('agentModal'));
    modal.show();
}

function openEditModal(id, name, phone, vehicle) {
    document.getElementById('agentId').value = id;
    document.getElementById('agentName').value = name;
    document.getElementById('agentPhone').value = phone;
    document.getElementById('agentVehicle').value = vehicle;
    document.getElementById('agentModalLabel').innerText = 'Edit Delivery Agent';
    
    const modal = new bootstrap.Modal(document.getElementById('agentModal'));
    modal.show();
}

function saveAgent() {
    const form = document.getElementById('agentForm');
    const formData = new FormData(form);
    
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=delivery_agents&action=save', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(res => {
        hideLoader();
        if (res.success) {
            showToast(res.message, 'success');
            bootstrap.Modal.getInstance(document.getElementById('agentModal')).hide();
            loadAgents();
        } else {
            showToast(res.message, 'danger');
        }
    })
    .catch(err => {
        hideLoader();
        showToast('Error saving agent details', 'danger');
        console.error(err);
    });
}

function deleteAgent(id) {
    confirmAction('Are you sure you want to delete this agent? Existing assigned completed orders will have the agent set to Null.', function() {
        const formData = new FormData();
        formData.append('id', id);
        formData.append('csrf_token', window.csrfToken);
        
        showLoader();
        fetch('../../backend/api/crud_handlers.php?module=delivery_agents&action=delete', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (res.success) {
                showToast(res.message, 'success');
                loadAgents();
            } else {
                showToast(res.message, 'danger');
            }
        })
        .catch(err => {
            hideLoader();
            showToast('Error deleting agent', 'danger');
            console.error(err);
        });
    });
}

function viewPerformance(id) {
    showLoader();
    fetch(`../../backend/api/crud_handlers.php?module=delivery_agents&action=get&id=${id}`)
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast('Failed to fetch performance statistics', 'danger');
                return;
            }
            
            const agent = res.data;
            document.getElementById('performanceModalLabel').innerText = `${escapeHtml(agent.Name)} - Deliveries & Performance`;
            document.getElementById('perfTotalDeliveries').innerText = agent.stats.total_deliveries;
            document.getElementById('perfCompletedDeliveries').innerText = agent.stats.completed_deliveries;
            document.getElementById('perfActiveDeliveries').innerText = agent.stats.active_deliveries;
            document.getElementById('perfSuccessRate').innerText = agent.stats.success_rate + '%';
            
            const tbody = document.getElementById('assignedOrdersBody');
            tbody.innerHTML = '';
            
            if (agent.orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-secondary">No deliveries assigned to this agent.</td></tr>';
            } else {
                agent.orders.forEach(o => {
                    let badgeClass = 'badge-pending';
                    if (o.Status === 'Delivered') badgeClass = 'badge-delivered';
                    if (o.Status === 'Shipped') badgeClass = 'badge-shipped';
                    if (o.Status === 'Cancelled') badgeClass = 'badge-cancelled';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${o.Order_ID}</td>
                        <td>${escapeHtml(o.Customer_Name)}</td>
                        <td>${o.Order_Date}</td>
                        <td class="fw-600">₹${parseFloat(o.Total_Amount).toFixed(2)}</td>
                        <td>
                            <span class="badge-status ${badgeClass}">${o.Status}</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            
            const modal = new bootstrap.Modal(document.getElementById('performanceModal'));
            modal.show();
        })
        .catch(err => {
            hideLoader();
            showToast('Error fetching deliveries history', 'danger');
            console.error(err);
        });
}

function escapeHtml(text) {
    if (!text) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.toString().replace(/[&<>"']/g, m => map[m]);
}

function escapeJs(text) {
    if (!text) return '';
    return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}
</script>

</body>
</html>
