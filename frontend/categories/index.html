<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Admin Panel - Categories</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.bootstrap5.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
    <!-- Dynamically Injected Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <!-- Dynamically Injected Navbar -->
        <div id="navbar-container"></div>
        
        <main class="content-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-700 text-primary mb-0"><i class="bi bi-tags me-2"></i>Category Management</h3>
                <button type="button" class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg me-2"></i>Add Category
                </button>
            </div>

            <div class="custom-card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="categoriesTable" class="table table-hover table-striped w-100">
                            <thead>
                                <tr>
                                    <th style="width: 15%;">ID</th>
                                    <th style="width: 30%;">Category Name</th>
                                    <th style="width: 40%;">Description</th>
                                    <th style="width: 15%; text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="categoriesTableBody">
                                <!-- Loaded dynamically via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-600" id="categoryModalLabel">Add Category</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="categoryForm">
                <input type="hidden" name="csrf_token" id="formCsrfToken" value="">
                <input type="hidden" name="Category_ID" id="categoryId" value="">
                
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="categoryName" class="form-label fw-500">Category Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="categoryName" name="Category_Name" placeholder="e.g. Fruits" required>
                    </div>
                    <div class="mb-3">
                        <label for="categoryDescription" class="form-label fw-500">Description</label>
                        <textarea class="form-control" id="categoryDescription" name="Description" rows="3" placeholder="Category details..."></textarea>
                    </div>
                </div>
                
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Category</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables Core & Extensions -->
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>

<!-- Global layout controllers -->
<script src="../assets/js/main.js"></script>
<script src="../assets/js/layout.js"></script>

<script>
let datatableInstance = null;

document.addEventListener('DOMContentLoaded', function() {
    loadCategories();
    
    // Assign CSRF token to form when layout.js retrieves it
    setTimeout(() => {
        document.getElementById('formCsrfToken').value = window.csrfToken;
    }, 400);

    // Form Submit Handler
    document.getElementById('categoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveCategory();
    });
});

function loadCategories() {
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=categories&action=list')
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast(res.message, 'danger');
                return;
            }
            
            // Destroy datatable if exists to repopulate
            if ($.fn.DataTable.isDataTable('#categoriesTable')) {
                $('#categoriesTable').DataTable().destroy();
            }
            
            const tbody = document.getElementById('categoriesTableBody');
            tbody.innerHTML = '';
            
            res.data.forEach(cat => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${cat.Category_ID}</td>
                    <td class="fw-600">${escapeHtml(cat.Category_Name)}</td>
                    <td>${escapeHtml(cat.Description || '')}</td>
                    <td class="text-center">
                        <div class="btn-group gap-2">
                            <button class="btn btn-sm btn-outline-info rounded" onclick="openEditModal(${cat.Category_ID}, '${escapeJs(cat.Category_Name)}', '${escapeJs(cat.Description || '')}')" title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded" onclick="deleteCategory(${cat.Category_ID})" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            // Re-initialize DataTable with export buttons
            datatableInstance = $('#categoriesTable').DataTable({
                dom: 'Bfrtip',
                buttons: [
                    { extend: 'csv', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'excel', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'pdf', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'print', className: 'btn btn-sm btn-outline-primary' }
                ],
                pageLength: 10,
                responsive: true
            });
        })
        .catch(err => {
            hideLoader();
            showToast('Error loading categories data', 'danger');
            console.error(err);
        });
}

function openCreateModal() {
    document.getElementById('categoryId').value = '';
    document.getElementById('categoryName').value = '';
    document.getElementById('categoryDescription').value = '';
    document.getElementById('categoryModalLabel').innerText = 'Add Category';
    
    const modal = new bootstrap.Modal(document.getElementById('categoryModal'));
    modal.show();
}

function openEditModal(id, name, description) {
    document.getElementById('categoryId').value = id;
    document.getElementById('categoryName').value = name;
    document.getElementById('categoryDescription').value = description;
    document.getElementById('categoryModalLabel').innerText = 'Edit Category';
    
    const modal = new bootstrap.Modal(document.getElementById('categoryModal'));
    modal.show();
}

function saveCategory() {
    const form = document.getElementById('categoryForm');
    const formData = new FormData(form);
    
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=categories&action=save', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(res => {
        hideLoader();
        if (res.success) {
            showToast(res.message, 'success');
            bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
            loadCategories();
        } else {
            showToast(res.message, 'danger');
        }
    })
    .catch(err => {
        hideLoader();
        showToast('Error saving category', 'danger');
        console.error(err);
    });
}

function deleteCategory(id) {
    confirmAction('Are you sure you want to delete this category?', function() {
        const formData = new FormData();
        formData.append('id', id);
        formData.append('csrf_token', window.csrfToken);
        
        showLoader();
        fetch('../../backend/api/crud_handlers.php?module=categories&action=delete', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (res.success) {
                showToast(res.message, 'success');
                loadCategories();
            } else {
                showToast(res.message, 'danger');
            }
        })
        .catch(err => {
            hideLoader();
            showToast('Error deleting category', 'danger');
            console.error(err);
        });
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.toString().replace(/[&<>"']/g, m => map[m]);
}

function escapeJs(text) {
    if (!text) return '';
    return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}
</script>

</body>
</html>
