<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Admin Panel - Suppliers</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.bootstrap5.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
    <!-- Dynamically Injected Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <!-- Dynamically Injected Navbar -->
        <div id="navbar-container"></div>
        
        <main class="content-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-700 text-primary mb-0"><i class="bi bi-truck me-2"></i>Supplier Management</h3>
                <button type="button" class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg me-2"></i>Add Supplier
                </button>
            </div>

            <div class="custom-card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="suppliersTable" class="table table-hover table-striped w-100">
                            <thead>
                                <tr>
                                    <th style="width: 10%;">ID</th>
                                    <th style="width: 25%;">Supplier Name</th>
                                    <th style="width: 20%;">Contact No</th>
                                    <th style="width: 30%;">Address</th>
                                    <th style="width: 15%; text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="suppliersTableBody">
                                <!-- Loaded dynamically via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal fade" id="supplierModal" tabindex="-1" aria-labelledby="supplierModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-600" id="supplierModalLabel">Add Supplier</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="supplierForm">
                <input type="hidden" name="csrf_token" id="formCsrfToken" value="">
                <input type="hidden" name="Supplier_ID" id="supplierId" value="">
                
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="supplierName" class="form-label fw-500">Supplier Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="supplierName" name="Name" placeholder="e.g. Fresh Farms Pvt Ltd" required>
                    </div>
                    <div class="mb-3">
                        <label for="supplierContact" class="form-label fw-500">Contact Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="supplierContact" name="Contact_No" placeholder="e.g. 9877000001" required>
                    </div>
                    <div class="mb-3">
                        <label for="supplierAddress" class="form-label fw-500">Address</label>
                        <textarea class="form-control" id="supplierAddress" name="Address" rows="3" placeholder="Supplier location..."></textarea>
                    </div>
                </div>
                
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Supplier</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Performance & Products Modal -->
<div class="modal fade" id="performanceModal" tabindex="-1" aria-labelledby="performanceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-600" id="performanceModalLabel">Supplier Performance Analytics</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-4">
                        <div class="stat-card card-product py-3">
                            <div class="stat-value fs-4" id="perfProductsCount">0</div>
                            <div class="stat-label">Products Supplied</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="stat-card card-order py-3">
                            <div class="stat-value fs-4" id="perfOrdersCount">0</div>
                            <div class="stat-label">Total Orders Generated</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="stat-card card-revenue py-3">
                            <div class="stat-value fs-4" id="perfRevenueGen">₹0.00</div>
                            <div class="stat-label">Total Revenue Generated</div>
                        </div>
                    </div>
                </div>
                
                <h6 class="fw-700 text-primary mb-3"><i class="bi bi-box-seam me-2"></i>Linked Products Catalog</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-striped">
                        <thead>
                            <tr>
                                <th>Product ID</th>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Current Stock</th>
                            </tr>
                        </thead>
                        <tbody id="linkedProductsBody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>

<!-- Layout scripting -->
<script src="../assets/js/main.js"></script>
<script src="../assets/js/layout.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadSuppliers();
    
    setTimeout(() => {
        document.getElementById('formCsrfToken').value = window.csrfToken;
    }, 400);
    
    document.getElementById('supplierForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveSupplier();
    });
});

function loadSuppliers() {
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=suppliers&action=list')
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast(res.message, 'danger');
                return;
            }
            
            if ($.fn.DataTable.isDataTable('#suppliersTable')) {
                $('#suppliersTable').DataTable().destroy();
            }
            
            const tbody = document.getElementById('suppliersTableBody');
            tbody.innerHTML = '';
            
            res.data.forEach(sup => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${sup.Supplier_ID}</td>
                    <td class="fw-600">${escapeHtml(sup.Name)}</td>
                    <td>${escapeHtml(sup.Contact_No)}</td>
                    <td>${escapeHtml(sup.Address || '')}</td>
                    <td class="text-center">
                        <div class="btn-group gap-2">
                            <button class="btn btn-sm btn-outline-primary rounded" onclick="viewPerformance(${sup.Supplier_ID})" title="Performance Analytics">
                                <i class="bi bi-graph-up-arrow"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-info rounded" onclick="openEditModal(${sup.Supplier_ID}, '${escapeJs(sup.Name)}', '${escapeJs(sup.Contact_No)}', '${escapeJs(sup.Address || '')}')" title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded" onclick="deleteSupplier(${sup.Supplier_ID})" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            $('#suppliersTable').DataTable({
                dom: 'Bfrtip',
                buttons: [
                    { extend: 'csv', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'excel', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'pdf', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'print', className: 'btn btn-sm btn-outline-primary' }
                ],
                pageLength: 10,
                responsive: true
            });
        })
        .catch(err => {
            hideLoader();
            showToast('Error loading suppliers data', 'danger');
            console.error(err);
        });
}

function openCreateModal() {
    document.getElementById('supplierId').value = '';
    document.getElementById('supplierName').value = '';
    document.getElementById('supplierContact').value = '';
    document.getElementById('supplierAddress').value = '';
    document.getElementById('supplierModalLabel').innerText = 'Add Supplier';
    
    const modal = new bootstrap.Modal(document.getElementById('supplierModal'));
    modal.show();
}

function openEditModal(id, name, contact, address) {
    document.getElementById('supplierId').value = id;
    document.getElementById('supplierName').value = name;
    document.getElementById('supplierContact').value = contact;
    document.getElementById('supplierAddress').value = address;
    document.getElementById('supplierModalLabel').innerText = 'Edit Supplier';
    
    const modal = new bootstrap.Modal(document.getElementById('supplierModal'));
    modal.show();
}

function saveSupplier() {
    const form = document.getElementById('supplierForm');
    const formData = new FormData(form);
    
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=suppliers&action=save', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(res => {
        hideLoader();
        if (res.success) {
            showToast(res.message, 'success');
            bootstrap.Modal.getInstance(document.getElementById('supplierModal')).hide();
            loadSuppliers();
        } else {
            showToast(res.message, 'danger');
        }
    })
    .catch(err => {
        hideLoader();
        showToast('Error saving supplier', 'danger');
        console.error(err);
    });
}

function deleteSupplier(id) {
    confirmAction('Are you sure you want to delete this supplier?', function() {
        const formData = new FormData();
        formData.append('id', id);
        formData.append('csrf_token', window.csrfToken);
        
        showLoader();
        fetch('../../backend/api/crud_handlers.php?module=suppliers&action=delete', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (res.success) {
                showToast(res.message, 'success');
                loadSuppliers();
            } else {
                showToast(res.message, 'danger');
            }
        })
        .catch(err => {
            hideLoader();
            showToast('Error deleting supplier', 'danger');
            console.error(err);
        });
    });
}

function viewPerformance(id) {
    showLoader();
    fetch(`../../backend/api/crud_handlers.php?module=suppliers&action=get&id=${id}`)
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast('Failed to fetch supplier details', 'danger');
                return;
            }
            
            const sup = res.data;
            document.getElementById('performanceModalLabel').innerText = `${escapeHtml(sup.Name)} - Performance & Catalog`;
            document.getElementById('perfProductsCount').innerText = sup.stats.total_products;
            document.getElementById('perfOrdersCount').innerText = sup.stats.total_orders;
            document.getElementById('perfRevenueGen').innerText = '₹' + parseFloat(sup.stats.revenue_gen).toFixed(2);
            
            const tbody = document.getElementById('linkedProductsBody');
            tbody.innerHTML = '';
            
            if (sup.products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-secondary">No products supplied by this vendor.</td></tr>';
            } else {
                sup.products.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${p.Product_ID}</td>
                        <td class="fw-500">${escapeHtml(p.Product_Name)}</td>
                        <td>₹${parseFloat(p.Price).toFixed(2)}</td>
                        <td>
                            <span class="badge ${p.Stock <= 50 ? 'bg-danger' : 'bg-success'}">${p.Stock} items</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            
            const modal = new bootstrap.Modal(document.getElementById('performanceModal'));
            modal.show();
        })
        .catch(err => {
            hideLoader();
            showToast('Error fetching performance analytics', 'danger');
            console.error(err);
        });
}

function escapeHtml(text) {
    if (!text) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.toString().replace(/[&<>"']/g, m => map[m]);
}

function escapeJs(text) {
    if (!text) return '';
    return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}
</script>

</body>
</html>
