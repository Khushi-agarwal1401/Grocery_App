<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Admin Panel - Products</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.bootstrap5.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
    <!-- Dynamically Injected Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <!-- Dynamically Injected Navbar -->
        <div id="navbar-container"></div>
        
        <main class="content-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-700 text-primary mb-0"><i class="bi bi-box-seam me-2"></i>Product Management</h3>
                <button type="button" class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg me-2"></i>Add Product
                </button>
            </div>

            <!-- Filters Panel -->
            <div class="custom-card mb-4">
                <div class="card-header bg-light-subtle">
                    <div class="fw-600"><i class="bi bi-funnel me-2"></i>Filters & Stock Alerts</div>
                </div>
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <!-- Category Filter -->
                        <div class="col-12 col-md-4">
                            <label for="filterCategory" class="form-label fw-500 text-secondary">Category</label>
                            <select id="filterCategory" class="form-select">
                                <option value="">All Categories</option>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        
                        <!-- Supplier Filter -->
                        <div class="col-12 col-md-4">
                            <label for="filterSupplier" class="form-label fw-500 text-secondary">Supplier</label>
                            <select id="filterSupplier" class="form-select">
                                <option value="">All Suppliers</option>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        
                        <!-- Stock Alert filter -->
                        <div class="col-12 col-md-4">
                            <div class="form-check form-switch pb-2">
                                <input class="form-check-input" type="checkbox" role="switch" id="filterLowStock">
                                <label class="form-check-label fw-600 text-danger" for="filterLowStock">
                                    <i class="bi bi-exclamation-triangle-fill me-1"></i>Show Low Stock Alerts (&le; 100)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Products Table Card -->
            <div class="custom-card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="productsTable" class="table table-hover table-striped w-100">
                            <thead>
                                <tr>
                                    <th style="width: 8%;">Image</th>
                                    <th style="width: 8%;">ID</th>
                                    <th style="width: 20%;">Product Name</th>
                                    <th style="width: 12%;">Price</th>
                                    <th style="width: 12%;">Stock</th>
                                    <th style="width: 15%;">Category</th>
                                    <th style="width: 15%;">Supplier</th>
                                    <th style="width: 10%; text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-600" id="productModalLabel">Add Product</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="productForm" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" id="formCsrfToken" value="">
                <input type="hidden" name="Product_ID" id="productId" value="">
                
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="productName" class="form-label fw-500">Product Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="productName" name="Product_Name" placeholder="e.g. Milk 1L" required>
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="productPrice" class="form-label fw-500">Price (₹) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="productPrice" name="Price" step="0.01" min="0.01" placeholder="e.g. 60.00" required>
                        </div>
                        <div class="col-6">
                            <label for="productStock" class="form-label fw-500">Stock Count <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="productStock" name="Stock" min="0" placeholder="e.g. 150" required>
                        </div>
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="productCategory" class="form-label fw-500">Category <span class="text-danger">*</span></label>
                            <select class="form-select" id="productCategory" name="Category_ID" required>
                                <option value="">Select...</option>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="col-6">
                            <label for="productSupplier" class="form-label fw-500">Supplier <span class="text-danger">*</span></label>
                            <select class="form-select" id="productSupplier" name="Supplier_ID" required>
                                <option value="">Select...</option>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="productImage" class="form-label fw-500">Product Image (JPG/PNG/WEBP)</label>
                        <input type="file" class="form-control" id="productImage" name="Product_Image" accept="image/*">
                        <div id="imagePreviewContainer" class="mt-2 text-center d-none">
                            <img id="imagePreview" src="" alt="Preview" class="img-thumbnail" style="max-height: 120px;">
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>

<!-- Layout scripting -->
<script src="../assets/js/main.js"></script>
<script src="../assets/js/layout.js"></script>

<script>
let oTable = null;

document.addEventListener('DOMContentLoaded', function() {
    loadFilterDropdowns();
    loadProducts();
    
    setTimeout(() => {
        document.getElementById('formCsrfToken').value = window.csrfToken;
    }, 400);
    
    // Form Submit
    document.getElementById('productForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveProduct();
    });

    // Custom Filters Event Listeners
    document.getElementById('filterCategory').addEventListener('change', function() {
        oTable.column(5).search(this.value).draw();
    });

    document.getElementById('filterSupplier').addEventListener('change', function() {
        oTable.column(6).search(this.value).draw();
    });

    document.getElementById('filterLowStock').addEventListener('change', function() {
        oTable.draw();
    });
    
    // Image Preview helper
    document.getElementById('productImage').addEventListener('change', function() {
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('imagePreviewContainer');
        const file = this.files[0];
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                container.classList.remove('d-none');
            }
            reader.readAsDataURL(file);
        } else {
            container.classList.add('d-none');
        }
    });

    // Custom DataTables Filter for Low Stock
    $.fn.dataTable.ext.search.push(
        function(settings, data, dataIndex) {
            const showLowStockOnly = document.getElementById('filterLowStock').checked;
            if (!showLowStockOnly) return true;
            
            // Stock is in column 4 (index 4)
            const stock = parseInt(data[4]) || 0;
            return stock <= 100;
        }
    );
});

function loadFilterDropdowns() {
    // Populate Categories Dropdowns
    fetch('../../backend/api/crud_handlers.php?module=categories&action=list')
        .then(res => res.json())
        .then(res => {
            if (res.success) {
                const filterCat = document.getElementById('filterCategory');
                const modalCat = document.getElementById('productCategory');
                res.data.forEach(cat => {
                    const opt1 = `<option value="${escapeHtml(cat.Category_Name)}">${escapeHtml(cat.Category_Name)}</option>`;
                    const opt2 = `<option value="${cat.Category_ID}">${escapeHtml(cat.Category_Name)}</option>`;
                    filterCat.insertAdjacentHTML('beforeend', opt1);
                    modalCat.insertAdjacentHTML('beforeend', opt2);
                });
            }
        });

    // Populate Suppliers Dropdowns
    fetch('../../backend/api/crud_handlers.php?module=suppliers&action=list')
        .then(res => res.json())
        .then(res => {
            if (res.success) {
                const filterSup = document.getElementById('filterSupplier');
                const modalSup = document.getElementById('productSupplier');
                res.data.forEach(sup => {
                    const opt1 = `<option value="${escapeHtml(sup.Name)}">${escapeHtml(sup.Name)}</option>`;
                    const opt2 = `<option value="${sup.Supplier_ID}">${escapeHtml(sup.Name)}</option>`;
                    filterSup.insertAdjacentHTML('beforeend', opt1);
                    modalSup.insertAdjacentHTML('beforeend', opt2);
                });
            }
        });
}

function loadProducts() {
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=products&action=list')
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (!res.success) {
                showToast(res.message, 'danger');
                return;
            }
            
            if ($.fn.DataTable.isDataTable('#productsTable')) {
                $('#productsTable').DataTable().destroy();
            }
            
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';
            
            res.data.forEach(p => {
                const tr = document.createElement('tr');
                
                // Set stock alert classes
                let stockBadge = `<span class="badge bg-success">${p.Stock} items</span>`;
                if (p.Stock <= 50) {
                    stockBadge = `<span class="badge bg-danger animate-pulse">${p.Stock} items (Low)</span>`;
                } else if (p.Stock <= 100) {
                    stockBadge = `<span class="badge bg-warning text-dark">${p.Stock} items</span>`;
                }
                
                const imgPath = `../../uploads/product_${p.Product_ID}.jpg`;
                
                tr.innerHTML = `
                    <td>
                        <div class="rounded-circle border overflow-hidden d-flex align-items-center justify-content-center bg-light" style="width: 40px; height: 40px;">
                            <img src="${imgPath}" onerror="this.onerror=null; this.src='https://placehold.co/40x40?text=${encodeURIComponent(p.Product_Name.substring(0,2))}'" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </td>
                    <td>${p.Product_ID}</td>
                    <td class="fw-600">${escapeHtml(p.Product_Name)}</td>
                    <td>₹${parseFloat(p.Price).toFixed(2)}</td>
                    <td>${stockBadge}</td>
                    <td>${escapeHtml(p.Category_Name || 'N/A')}</td>
                    <td>${escapeHtml(p.Supplier_Name || 'N/A')}</td>
                    <td class="text-center">
                        <div class="btn-group gap-2">
                            <button class="btn btn-sm btn-outline-info rounded" 
                                    onclick="openEditModal(${p.Product_ID}, '${escapeJs(p.Product_Name)}', ${p.Price}, ${p.Stock}, ${p.Category_ID}, ${p.Supplier_ID})" 
                                    title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded" onclick="deleteProduct(${p.Product_ID})" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            oTable = $('#productsTable').DataTable({
                dom: 'Bfrtip',
                buttons: [
                    { extend: 'csv', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'excel', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'pdf', className: 'btn btn-sm btn-outline-primary' },
                    { extend: 'print', className: 'btn btn-sm btn-outline-primary' }
                ],
                pageLength: 10,
                responsive: true
            });
        })
        .catch(err => {
            hideLoader();
            showToast('Error loading products data', 'danger');
            console.error(err);
        });
}

function openCreateModal() {
    document.getElementById('productId').value = '';
    document.getElementById('productName').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productStock').value = '';
    document.getElementById('productCategory').value = '';
    document.getElementById('productSupplier').value = '';
    document.getElementById('productImage').value = '';
    document.getElementById('imagePreviewContainer').classList.add('d-none');
    document.getElementById('productModalLabel').innerText = 'Add Product';
    
    const modal = new bootstrap.Modal(document.getElementById('productModal'));
    modal.show();
}

function openEditModal(id, name, price, stock, categoryId, supplierId) {
    document.getElementById('productId').value = id;
    document.getElementById('productName').value = name;
    document.getElementById('productPrice').value = price;
    document.getElementById('productStock').value = stock;
    document.getElementById('productCategory').value = categoryId;
    document.getElementById('productSupplier').value = supplierId;
    document.getElementById('productImage').value = '';
    
    const preview = document.getElementById('imagePreview');
    const container = document.getElementById('imagePreviewContainer');
    preview.src = `../../uploads/product_${id}.jpg?t=${Date.now()}`;
    container.classList.remove('d-none');
    
    document.getElementById('productModalLabel').innerText = 'Edit Product';
    
    const modal = new bootstrap.Modal(document.getElementById('productModal'));
    modal.show();
}

function saveProduct() {
    const form = document.getElementById('productForm');
    const formData = new FormData(form);
    
    showLoader();
    fetch('../../backend/api/crud_handlers.php?module=products&action=save', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(res => {
        hideLoader();
        if (res.success) {
            showToast(res.message, 'success');
            bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
            loadProducts();
        } else {
            showToast(res.message, 'danger');
        }
    })
    .catch(err => {
        hideLoader();
        showToast('Error saving product', 'danger');
        console.error(err);
    });
}

function deleteProduct(id) {
    confirmAction('Are you sure you want to delete this product?', function() {
        const formData = new FormData();
        formData.append('id', id);
        formData.append('csrf_token', window.csrfToken);
        
        showLoader();
        fetch('../../backend/api/crud_handlers.php?module=products&action=delete', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(res => {
            hideLoader();
            if (res.success) {
                showToast(res.message, 'success');
                loadProducts();
            } else {
                showToast(res.message, 'danger');
            }
        })
        .catch(err => {
            hideLoader();
            showToast('Error deleting product', 'danger');
            console.error(err);
        });
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.toString().replace(/[&<>"']/g, m => map[m]);
}

function escapeJs(text) {
    if (!text) return '';
    return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
}
</script>

</body>
</html>
