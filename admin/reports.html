<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Admin - Reports</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global Stylesheets -->
    <link href="/assets/css/styles.css" rel="stylesheet">
    <link href="/assets/css/admin.css" rel="stylesheet">
    <script>
        const colorScheme = localStorage.getItem("color-scheme") || "light";
        document.documentElement.setAttribute('data-theme', colorScheme);
    </script>
</head>
<body class="admin-body">

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="/admin/index.html" class="sidebar-brand">
            <i class="bi bi-cart4"></i>
            <span>GROCERY ADMIN</span>
        </a>
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="/admin/index.html" class="sidebar-link">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/admin/categories.html" class="sidebar-link">
                    <i class="bi bi-tags"></i>
                    <span>Categories</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/admin/suppliers.html" class="sidebar-link">
                    <i class="bi bi-truck"></i>
                    <span>Suppliers</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/admin/customers.html" class="sidebar-link">
                    <i class="bi bi-people"></i>
                    <span>Customers</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/admin/products.html" class="sidebar-link">
                    <i class="bi bi-box-seam"></i>
                    <span>Products</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/admin/orders.html" class="sidebar-link">
                    <i class="bi bi-receipt"></i>
                    <span>Orders</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/admin/payments.html" class="sidebar-link">
                    <i class="bi bi-credit-card"></i>
                    <span>Payments</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/admin/delivery_agents.html" class="sidebar-link">
                    <i class="bi bi-bicycle"></i>
                    <span>Delivery Agents</span>
                </a>
            </li>
            <li class="sidebar-item active">
                <a href="/admin/reports.html" class="sidebar-link">
                    <i class="bi bi-graph-up-arrow"></i>
                    <span>Reports</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="admin-wrapper">
        <!-- Top Navbar -->
        <header class="top-navbar glass-effect">
            <div class="d-flex align-items-center">
                <button id="sidebar-toggler" class="btn border-0 sidebar-toggler px-2 text-primary" type="button">
                    <i class="bi bi-list fs-3"></i>
                </button>
                <h4 class="mb-0 fw-700 text-primary">Analytical Reports</h4>
            </div>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <button id="theme-toggle" class="navbar-action-btn" title="Toggle Theme" type="button">
                    <i class="bi bi-moon-fill"></i>
                </button>
                <div class="dropdown">
                    <button class="btn border-0 d-flex align-items-center gap-2 p-1" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-600" style="width: 36px; height: 36px;">
                            A
                        </div>
                        <span class="d-none d-md-inline fw-600 text-secondary" id="userDropdownName">Admin</span>
                        <i class="bi bi-chevron-down text-secondary fs-8"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item py-2" href="#" id="adminSignOutBtn"><i class="bi bi-box-arrow-right me-2 text-danger"></i> Sign Out</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <main class="container-fluid p-4">
            <!-- Filter Bar Card -->
            <div class="card glass-effect border-0 p-4 mb-4">
                <form id="reportsFilterForm">
                    <div class="row g-3 align-items-end">
                        <div class="col-12 col-md-3">
                            <label for="reportType" class="form-label fw-600">Report Type</label>
                            <select class="form-select" id="reportType" required>
                                <option value="sales" selected>Sales Report</option>
                                <option value="revenue">Revenue Report</option>
                                <option value="product">Product Analytics</option>
                                <option value="customer">Customer Value Analysis</option>
                                <option value="supplier">Supplier Volumes</option>
                                <option value="delivery">Delivery Performance</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-3" id="startDateGroup">
                            <label for="startDate" class="form-label fw-600">Start Date</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="col-6 col-md-3" id="endDateGroup">
                            <label for="endDate" class="form-label fw-600">End Date</label>
                            <input type="date" class="form-control" id="endDate">
                        </div>
                        <div class="col-12 col-md-3">
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                                    <i class="bi bi-arrow-repeat"></i>
                                    <span>Generate</span>
                                </button>
                                <button type="button" class="btn btn-success py-2 px-3" id="exportBtn" title="Export to CSV" disabled>
                                    <i class="bi bi-download"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Report Results View -->
            <div class="card glass-effect border-0 p-4" id="reportCard" style="display:none;">
                <h5 class="fw-800 mb-4 text-secondary" id="reportTitle">Report Results</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="reportTable" style="width:100%;">
                        <thead id="reportTableHead">
                            <!-- Populated dynamically -->
                        </thead>
                        <tbody id="reportTableBody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="empty-state py-5" id="reportEmptyState">
                <i class="bi bi-graph-up-arrow"></i>
                <h5>No Report Generated Yet</h5>
                <p class="text-secondary mb-0">Select a report type above and click "Generate" to visualize analytics.</p>
            </div>
        </main>
    </div>

    <!-- JS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    
    <script>
        let reportDataCached = null;
        let activeReportType = 'sales';

        document.addEventListener('DOMContentLoaded', () => {
            // Set default date range (current month)
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            
            document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
            document.getElementById('endDate').value = today.toISOString().split('T')[0];

            // Show/Hide date filters based on report type
            document.getElementById('reportType').addEventListener('change', function() {
                const dateFilters = ['sales', 'revenue'].includes(this.value);
                document.getElementById('startDateGroup').style.opacity = dateFilters ? '1' : '0.4';
                document.getElementById('endDateGroup').style.opacity = dateFilters ? '1' : '0.4';
                document.getElementById('startDate').disabled = !dateFilters;
                document.getElementById('endDate').disabled = !dateFilters;
            });

            // Handle filter form submit
            document.getElementById('reportsFilterForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await generateReport();
            });

            // Handle Export CSV click
            document.getElementById('exportBtn').addEventListener('click', () => {
                exportReportToCSV();
            });

            // Mobile sidebar toggler
            const sidebarToggler = document.getElementById('sidebar-toggler');
            const sidebar = document.querySelector('.sidebar');
            if (sidebarToggler && sidebar) {
                sidebarToggler.addEventListener('click', (e) => {
                    e.stopPropagation();
                    sidebar.classList.toggle('show');
                });
            }

            // Theme toggler
            document.getElementById('theme-toggle').addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('color-scheme', newTheme);
            });

            // Sign out
            document.getElementById('adminSignOutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.Auth.logout(true);
            });
        });

        async function generateReport() {
            const type = document.getElementById('reportType').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            activeReportType = type;

            const params = { type: type };
            if (['sales', 'revenue'].includes(type)) {
                params.start_date = startDate;
                params.end_date = endDate;
            }

            try {
                const res = await window.API.get('reports_data.php', params);
                if (res.success) {
                    reportDataCached = res.data;
                    renderReportTable(type, res.data);
                    
                    document.getElementById('reportEmptyState').style.display = 'none';
                    document.getElementById('reportCard').style.display = 'block';
                    document.getElementById('exportBtn').disabled = res.data.length === 0;
                    
                    window.API.showToast(`Generated report with ${res.data.length} records.`, 'success');
                } else {
                    window.API.showToast(res.message || 'Failed to fetch report', 'danger');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderReportTable(type, data) {
            const head = document.getElementById('reportTableHead');
            const tbody = document.getElementById('reportTableBody');
            
            head.innerHTML = '';
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="text-center text-secondary py-5">No records found within the selected scope.</td></tr>`;
                return;
            }

            let headersHtml = '';
            
            switch (type) {
                case 'sales':
                    document.getElementById('reportTitle').textContent = 'Sales Orders Report';
                    headersHtml = `
                        <tr>
                            <th>Order ID</th>
                            <th>Order Date</th>
                            <th>Customer Name</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                        </tr>
                    `;
                    data.forEach(row => {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>#${row.Order_ID}</strong></td>
                                <td>${row.Order_Date}</td>
                                <td>${row.Customer_Name}</td>
                                <td class="fw-700 text-primary">₹${parseFloat(row.Total_Amount).toFixed(2)}</td>
                                <td><span class="badge bg-light text-dark border">${row.Status}</span></td>
                            </tr>
                        `;
                    });
                    break;
                    
                case 'revenue':
                    document.getElementById('reportTitle').textContent = 'Revenue Transaction Logs';
                    headersHtml = `
                        <tr>
                            <th>Payment ID</th>
                            <th>Order ID</th>
                            <th>Amount</th>
                            <th>Payment Mode</th>
                            <th>Payment Status</th>
                            <th>Payment Date</th>
                        </tr>
                    `;
                    data.forEach(row => {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>#${row.Payment_ID}</strong></td>
                                <td>#${row.Order_ID}</td>
                                <td class="fw-700 text-primary">₹${parseFloat(row.Amount).toFixed(2)}</td>
                                <td>${row.Payment_Mode}</td>
                                <td><span class="badge bg-success">${row.Payment_Status}</span></td>
                                <td>${row.Payment_Date || 'N/A'}</td>
                            </tr>
                        `;
                    });
                    break;
                    
                case 'product':
                    document.getElementById('reportTitle').textContent = 'Product Sales & Inventory Report';
                    headersHtml = `
                        <tr>
                            <th>Product ID</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Supplier</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Units Sold</th>
                            <th>Total Revenue</th>
                        </tr>
                    `;
                    data.forEach(row => {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>#${row.Product_ID}</strong></td>
                                <td><span class="fw-700">${row.Product_Name}</span></td>
                                <td>${row.Category_Name}</td>
                                <td>${row.Supplier_Name}</td>
                                <td>₹${parseFloat(row.Price).toFixed(2)}</td>
                                <td>${row.Stock}</td>
                                <td><strong>${row.Units_Sold}</strong></td>
                                <td class="fw-700 text-primary">₹${parseFloat(row.Total_Revenue).toFixed(2)}</td>
                            </tr>
                        `;
                    });
                    break;
                    
                case 'customer':
                    document.getElementById('reportTitle').textContent = 'High-Value Customers Report';
                    headersHtml = `
                        <tr>
                            <th>Customer ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Total Orders</th>
                            <th>Total Spend</th>
                        </tr>
                    `;
                    data.forEach(row => {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>#${row.Customer_ID}</strong></td>
                                <td><span class="fw-700">${row.Name}</span></td>
                                <td>${row.Email || '-'}</td>
                                <td>${row.Phone}</td>
                                <td>${row.Total_Orders}</td>
                                <td class="fw-700 text-primary">₹${parseFloat(row.Total_Spend).toFixed(2)}</td>
                            </tr>
                        `;
                    });
                    break;
                    
                case 'supplier':
                    document.getElementById('reportTitle').textContent = 'Supplier Supplies Volumes';
                    headersHtml = `
                        <tr>
                            <th>Supplier ID</th>
                            <th>Supplier Name</th>
                            <th>Contact Phone</th>
                            <th>Products Handled</th>
                            <th>Units Sold</th>
                            <th>Generated Revenue</th>
                        </tr>
                    `;
                    data.forEach(row => {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>#${row.Supplier_ID}</strong></td>
                                <td><span class="fw-700">${row.Name}</span></td>
                                <td>${row.Contact_No}</td>
                                <td>${row.Total_Products}</td>
                                <td>${row.Units_Sold}</td>
                                <td class="fw-700 text-primary">₹${parseFloat(row.Total_Revenue).toFixed(2)}</td>
                            </tr>
                        `;
                    });
                    break;
                    
                case 'delivery':
                    document.getElementById('reportTitle').textContent = 'Delivery Fleet Efficiency';
                    headersHtml = `
                        <tr>
                            <th>Agent ID</th>
                            <th>Agent Name</th>
                            <th>Phone Contact</th>
                            <th>Total Assigned</th>
                            <th>Deliveries Completed</th>
                            <th>Deliveries Cancelled</th>
                            <th>Efficiency Rate</th>
                        </tr>
                    `;
                    data.forEach(row => {
                        const total = parseInt(row.Assigned_Orders);
                        const comp = parseInt(row.Completed);
                        const rate = total > 0 ? ((comp / total) * 100).toFixed(1) + '%' : '100.0%';
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>#${row.Agent_ID}</strong></td>
                                <td><span class="fw-700">${row.Name}</span></td>
                                <td>${row.Phone}</td>
                                <td>${row.Assigned_Orders}</td>
                                <td>${row.Completed}</td>
                                <td>${row.Cancelled}</td>
                                <td><span class="badge bg-light text-dark border">${rate}</span></td>
                            </tr>
                        `;
                    });
                    break;
            }
            
            head.innerHTML = headersHtml;
        }

        function exportReportToCSV() {
            if (!reportDataCached || reportDataCached.length === 0) return;

            // Generate Headers based on report columns
            const headers = Object.keys(reportDataCached[0]);
            let csvContent = "data:text/csv;charset=utf-8,";
            
            // Append header row
            csvContent += headers.join(",") + "\n";
            
            // Append rows
            reportDataCached.forEach(row => {
                const escapedValues = headers.map(header => {
                    let val = row[header] !== null ? row[header] : '';
                    // Escape quotes and commas
                    if (typeof val === 'string') {
                        val = val.replace(/"/g, '""');
                        if (val.includes(',') || val.includes('\n')) {
                            val = `"${val}"`;
                        }
                    }
                    return val;
                });
                csvContent += escapedValues.join(",") + "\n";
            });

            // Trigger Download
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `${activeReportType}_report_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.API.showToast('CSV report downloaded successfully.', 'info');
        }
    </script>
</body>
</html>
